apply plugin: 'com.android.application'

dependencies {
    implementation 'com.android.support:support-v13:23.3.0'
    implementation 'com.android.support:appcompat-v7:23.3.0'
}

android {
    compileSdkVersion 23
    flavorDimensions "tier"
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId "org.skia.skottie"
        minSdkVersion 19
        targetSdkVersion 19
        versionCode 1
        versionName "1.0"
        signingConfig signingConfigs.debug
    }
    sourceSets.main.jni.srcDirs = [] //disable automatic ndk-build call
    //sourceSets.main.jniLibs.srcDir "src/main/libs"
    //productFlavors { universal{}; arm {}; arm64 {}; x86 {}; x64 {}; arm64vulkan{}; }

    sourceSets.main.jniLibs.srcDirs 'src/main/libs', '../../../../tools/skottie/jni/', '../../../../include/', '../../../../tools/skottie/jni/', '../../../../src/', '../../../../experimental/'
    productFlavors {
        arm64 {
            ndk {
                abiFilters 'arm64-v8a'
            }
        }
    }

    setupSkiaLibraryBuild(project, applicationVariants, "libskottie")

    externalNativeBuild {
        cmake {
            path "CMakeLists.txt"
        }
    }
}
