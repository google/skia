//import com.android.builder.core.BuilderConstants

apply plugin: 'com.android.application'

dependencies {
    implementation 'com.android.support:support-v13:28.0.0'
    implementation 'com.android.support:appcompat-v7:28.0.0'
}

android {
    compileSdkVersion 28
    defaultConfig {
        applicationId "org.skia.viewer"
        ext.enableCrashlytics = false
        externalNativeBuild {
            cmake {
                //Native libraries to build
                targets "libviewer"
            }
        }
    }

    externalNativeBuild {
        cmake {
            buildStagingDirectory "../../../../out/android_cmake_config"
            path "../CMakeLists.txt"
        }
    }

    buildTypes {
        debug {
            jniDebuggable = true
            externalNativeBuild {
                cmake {
                    cppFlags "-g"
                }
            }
        }
    }

    flavorDimensions "abi", "api"
    productFlavors {
        // min API level for Skia development builds
        api21 {
            dimension "api"
            minSdkVersion 21
            targetSdkVersion 21
            // To ensure the target device receives the version of the app with
            // the highest compatible API level, assign version codes in increasing
            // value with API level
            versionCode 21
            versionName "1.0 API 21"
            versionNameSuffix "-api21"
        }

        // Vulkan Support
        api24 {
            dimension "api"
            minSdkVersion 24
            targetSdkVersion 24
            // To ensure the target device receives the version of the app with
            // the highest compatible API level, assign version codes in increasing
            // value with API level
            versionCode 24
            versionName "1.0 API 24"
            versionNameSuffix "-api24"
        }

        // HardwareBuffer Support
        api26 {
            dimension "api"
            minSdkVersion 26
            targetSdkVersion 26
            // To ensure the target device receives the version of the app with
            // the highest compatible API level, assign version codes in increasing
            // value with API level
            versionCode 26
            versionName "1.0 API 26"
            versionNameSuffix "-api26"
        }

        arm {
            dimension "abi"
            ndk {
                abiFilters 'armeabi-v7a'
            }
        }
        arm64 {
            dimension "abi"
            ndk {
                abiFilters 'arm64-v8a'
            }
        }
        x86 {
            dimension "abi"
            ndk {
                abiFilters 'x86'
            }
        }
        x86_64 {
            dimension "abi"
            ndk {
                abiFilters 'x86_64'
            }
        }

    }

    task copyResources(type: Copy) {
        from "../../../../resources"
        into "src/main/assets/resources"
    }
    preBuild.dependsOn copyResources

    // Exclude the release variant for speed of development?
//    android.variantFilter { variant ->
//        def build = variant.buildType.name
//        if (build == BuilderConstants.RELEASE) {
//            variant.setIgnore(true)
//        }
//    }
}
