<!DOCTYPE html>
<title>Including Skia WASM</title>
<meta charset="utf-8" />
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<svg id=svg xmlns='http://www.w3.org/2000/svg' width=100 height=100 viewPort='0 0 100 100'>
</svg>

<script type="text/javascript" src="./npm-wasm/bin/pathkit.js"></script>

<script type="text/javascript" charset="utf-8">

  PathKit({
    locateFile: (file) => "./npm-wasm/bin/"+file,
  }).then((Module) => {

    // Called after WASM loaded and initialized
    function entryPoint() {
      // TODO(kjlubick): Show SVG string in as one way and Path2d-like syntax for the other way
      // since those are most familiar to outside users.
      let commands = [];

      commands.push([Module.MOVE_VERB, 0, 0]);
      commands.push([Module.LINE_VERB, 40, 0]);
      commands.push([Module.LINE_VERB, 20, 20]);
      commands.push([Module.CLOSE_VERB]);

      commands.push([Module.MOVE_VERB, 20, 0]);
      commands.push([Module.LINE_VERB, 60, 0]);
      commands.push([Module.LINE_VERB, 40, 20]);
      commands.push([Module.CLOSE_VERB]);

      let path = SkPathFromCmdTyped(commands);

      let simplePath = Module.SimplifyPath(path);
      let simpleStr = Module.ToSVGString(simplePath);

      let newPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      newPath.setAttribute('stroke', 'rgb(0,0,200)');
      newPath.setAttribute('fill', 'white');
      newPath.setAttribute('d', simpleStr);
      document.getElementById('svg').appendChild(newPath);
    }


    function floatTypedArrayFrom2D(arr) {
      // expects 2d array where index 0 is verb and index 1-n are args
      let len = 0;
      for (cmd of arr) {
        len += cmd.length;
      }

      const ta = new Float32Array(len);
      let i = 0;
      for (cmd of arr) {
        for (c of cmd) {
          ta[i] = c;
          i++;
        }
      }

      retVal = Module._malloc(ta.length * ta.BYTES_PER_ELEMENT);
      Module.HEAPF32.set(ta, retVal / ta.BYTES_PER_ELEMENT);
      return [retVal, len];
    }

    function SkPathFromCmdTyped(cmdArr) {
      let [cmd, len] = floatTypedArrayFrom2D(cmdArr);
      let path = Module.FromCmds(cmd, len);
      Module._free(cmd);
      return path;
    }

    entryPoint();

  });

  // var Module = {
  //   postRun:[entryPoint],
  //   locateFile: (file) => "./npm-wasm/bin/"+file,
  // };
</script>
