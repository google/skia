<!DOCTYPE html>
<title>Skia -> WebGL (via WASM)</title>
<meta charset="utf-8" />
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  svg, canvas {
    border: 1px dashed #AAA;
  }

  canvas {
    width: 300px;
    height: 300px;
  }


</style>

<h2> Skia draws to WebGL</h2>
<canvas id=demo height=300 width=300></canvas>


<script type="text/javascript" src="/node_modules/skia-wasm/bin/skia.js"></script>

<script type="text/javascript" charset="utf-8">

  SkiaInit({
    locateFile: (file) => '/node_modules/skia-wasm/bin/'+file,
  }).then((Skia) => {
    window.Skia = Skia;
    DrawingExample(Skia);
  });

  function DrawingExample(Skia) {
    const surface = Skia.makeWebGLSurface('demo');
    if (!surface) {
      console.log('Could not make surface');
    }

    const canvas = surface.getCanvas();

    const paint = new Skia.SkPaint();

    const dpe = Skia.MakeSkDiscretePathEffect(10.0, 4.0);

    paint.setPathEffect(dpe);
    paint.setStyle(Skia.SkPaintStyle.kStroke_Style);
    paint.setStrokeWidth(2.0);
    paint.setAntiAlias(true);
    paint.setColor(Skia.Color(66, 129, 164, 1.0));

    canvas.clear(Skia.Color(255, 255, 255, 1.0));

    const path = starPath();

    canvas.drawPath(path, paint);

    path.delete();
    dpe.delete();
    paint.delete();
  }

  function starPath() {
    const R = 115.2;
    const C = 128.0;
    let p = new Skia.SkPath();
    p.moveTo(C + R, C);
    for (let i = 1; i < 8; i++) {
      let a = 2.6927937 * i;
      p.lineTo(C + R * Math.cos(a), C + R * Math.sin(a));
    }
    return p;
  }

</script>
