        function getAjax(url, success) {
            var xhr = window.XMLHttpRequest ? new XMLHttpRequest() : new ActiveXObject('Microsoft.XMLHTTP');
            xhr.open('GET', url);
            xhr.onreadystatechange = function () {
                if (xhr.readyState > 3 && xhr.status == 200) success(xhr.responseText);
            };
            xhr.send();
            return xhr;
        }

        function postAjax(url, data, success, name) {
            var debugObj = JSON.parse(data);
            console.log(name + ": " + debugObj.code + "\n");
            var params = typeof data == 'string' ? data : Object.keys(data).map(
                    function (k) { return encodeURIComponent(k) + '=' + encodeURIComponent(data[k]) }
                ).join('&');

            var xhr = window.XMLHttpRequest ? new XMLHttpRequest() : new ActiveXObject("Microsoft.XMLHTTP");
            xhr.name = name;
            xhr.open('POST', url);
            xhr.onreadystatechange = function () {
                if (xhr.readyState > 3 && xhr.status == 200) { success(xhr.responseText, xhr.name); }
            };
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.send(params);
            return xhr;
        }

        function testResult(data, name) {
            var obj = JSON.parse(data);
            if (obj.compile_errors && obj.compile_errors.length > 0) {
                console.log("compile_errors:");
                for (var errIndex in obj.compile_errors) {
                    var errStr = obj.compile_errors[errIndex].text;
                    if (errStr.startsWith("ninja:")) {
                        continue;
                    }
                    if (errStr.startsWith("[") && errStr.endsWith("draw.cpp")) {
                        continue;
                    }
                    if (errStr.startsWith("FAILED: ") && errStr.endsWith("draw.o ")) {
                        continue;
                    }
                    if (errStr.startsWith("c++ ") && errStr.endsWith("draw.o")) {
                        continue;
                    }
                    if ("../../tools/fiddle/draw.cpp: In function 'void draw(SkCanvas*)':" == errStr) {
                        continue;
                    }
                    if (errStr.startsWith("   return DrawOptions(")) {
                        continue;
                    }
                    console.log(errStr);
                }
            }
            if (obj.runtime_error) {
                console.log("runtime_error:");
                console.log(obj.runtime_error);
            }
            if (obj.fiddleHash) {
                console.log("name: " + name + "  fiddleHash: " + obj.fiddleHash);
//                getAjax("https://fiddle.skia.org/i/" + obj.fiddleHash + ".txt", function (data) { console.log(data); });
            }
        }
