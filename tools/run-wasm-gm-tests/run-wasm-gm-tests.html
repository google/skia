<!-- This runs the GMs and unit tests which have been compiled to WASM
-->
<!DOCTYPE html>
<html>
<head>
  <title>CanvasKit SKP Perf</title>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="/static/wasm_gm_tests.js" type="text/javascript" charset="utf-8"></script>
  <style type="text/css" media="screen">
    #status_text {
      min-width: 900px;
      min-height: 500px;
    }
  </style>
</head>
<body>
<main>
  <button id=start_tests>Start Tests</button>
  <br>
  <textarea id=status_text></textarea>

  <canvas id=gm_canvas></canvas>
</main>
<script type="text/javascript" charset="utf-8">
  const loadTests = InitWasmGMTests({
    locateFile: (file) => '/static/'+file,
  });

  const loadKnownHashes = fetch('/static/hashes.txt').then((resp) => resp.text());

  Promise.all([loadTests, loadKnownHashes]).then(([GM, hashes]) => {
    console.log("hashes", hashes.length);
    console.error("GOIJSOFSDKJF")
    document.getElementById('start_tests').addEventListener('click', async () => {
      window._testsProgress = 0;
      RunGMs(GM);
      window._testsDone = true;
    });
    window._testsReady = true;
  });

  function RunGMs(GM) {
    const canvas = document.getElementById('gm_canvas');
    const ctx = GM.GetWebGLContext(canvas, 2);
    const grcontext = GM.MakeGrContext(ctx);

    const names = GM.ListGMs();
    names.sort();
    for (const name of names) {
      const pngAndMetadata = GM.RunGM(grcontext, name);
      if (!pngAndMetadata) {
        continue;
      }
      const ta = document.getElementById('status_text');
      ta.value += `Test ${name} drew ${pngAndMetadata.hash}\n`;
      console.log(pngAndMetadata);
      // TODO(kjlubick) add it to the JSON
      // TODO(kjlubick) add a post request to save the PNG to disk.
      window._testsProgress++;
    }
    grcontext.delete();
  }
</script>
</body>
</html>
