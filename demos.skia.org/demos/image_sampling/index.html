<!DOCTYPE html>
<title>Image Scaling</title>
<meta charset="utf-8" />
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script type="text/javascript" src="https://particles.skia.org/dist/canvaskit.js"></script>

<style>
  canvas {
    border: 1px dashed grey;
  }
</style>

<body>
  <h1>Image Scaling</h1>

  <div class="slidecontainer">
      <input type="range" min="1" max="1000" value="500" class="slider" id="canvas_scale">
      <input type="range" min="1" max="1000" value="500" class="slider" id="cubic_B">
      <input type="range" min="1" max="1000" value="500" class="slider" id="cubic_C">
  </div>

  <canvas id=draw width=2048 height=2048></canvas>
</body>

<script type="text/javascript" charset="utf-8">

    var canvas_scale = document.getElementById("canvas_scale");
    var cubic_C = document.getElementById("cubic_B");
    var cubic_C = document.getElementById("cubic_C");

  Promise.all([
      CanvasKitInit({ locateFile: (file) => 'https://particles.skia.org/dist/' + file }),
      fetch('zone_plate.png')
   ]).then(([
      CanvasKit,
      imageBlob
  ]) => {
    const surface = CanvasKit.MakeCanvasSurface('draw');
    if (!surface) {
      throw 'Could not make surface';
    }

    canvas_scale.oninput = function() {
        surface.requestAnimationFrame(drawFrame);
    }
    cubic_B.oninput = function() {
        surface.requestAnimationFrame(drawFrame);
    }
    cubic_C.oninput = function() {
        surface.requestAnimationFrame(drawFrame);
    }

    const paint = new CanvasKit.Paint();

    var image = null;
    var srcRect = null;
    var dstRect = null;
    var W, H;

    imageBlob.arrayBuffer().then((buffer_data) => {
        image = CanvasKit.MakeImageFromEncoded(buffer_data);
        W = image.width()/2;
        H = image.height()/2;
        srcRect = [W/2, H/2, W*3/2, H*3/2];
        dstRect = [0, 0, W, H];
        surface.requestAnimationFrame(drawFrame);
    });

    function drawFrame(canvas) {

      if (image) {
          const scale = canvas_scale.value / 1000.0;
          canvas.save();
          canvas.scale(scale, scale);
          const SPACER = 20;
          const filters = [CanvasKit.FilterMode.Nearest, CanvasKit.FilterMode.Linear];
          const mipmaps = [CanvasKit.MipmapMode.None, CanvasKit.MipmapMode.Nearest, CanvasKit.FilterMode.Linear];
          for (f in filters) {
              canvas.save();
              for (m in mipmaps) {
                  canvas.drawImageRectOptions(image, srcRect, dstRect, f, m, paint);
                  canvas.translate(W + SPACER, 0);
              }
              canvas.restore();
              canvas.translate(0, H + SPACER);
          }

          const B = cubic_B.value / 1000.0;
          const C = cubic_C.value / 1000.0;
          const cubics = [ [B, C], [1/3.0, 1/3.0], [1/2.0, 1/2.0] ];
          for (var i = 0; i < cubics.length; ++i) {
              var c = cubics[i];
              canvas.drawImageRectCubic(image, srcRect, dstRect, c[0], c[1], paint);
              canvas.translate(W + SPACER, 0);
          }
          canvas.restore();
        }
    }
    surface.requestAnimationFrame(drawFrame);
  });

</script>
