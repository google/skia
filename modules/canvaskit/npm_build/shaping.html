<!DOCTYPE html>
<title>Diagnose Font Cache Miss</title>
<meta charset="utf-8" />
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="text/javascript" src="/node_modules/canvaskit/bin/canvaskit.js"></script>

<script type="text/javascript" charset="utf-8">

  let CanvasKit = null;
  const cdn = 'https://storage.googleapis.com/skia-cdn/misc/';

  const ckLoaded = CanvasKitInit({locateFile: (file) => '/node_modules/canvaskit/bin/'+file});
  const loadRoboto = fetch(cdn + 'Roboto-Regular.ttf').then((response) => response.arrayBuffer());
  const loadEmoji = fetch(cdn + 'NotoColorEmoji.ttf').then((response) => response.arrayBuffer());

  // Examples requiring external resources.
  Promise.all([ckLoaded, loadRoboto, loadEmoji]).then((results) => {
    ShapingJS(...results);
  });

  function ShapingJS(CanvasKit, robotoData, emojiData) {
    const fontMgr = CanvasKit.FontMgr.RefDefault();
    const robotoFace = fontMgr.MakeTypefaceFromData(robotoData);
    const robotoFont = new CanvasKit.Font(robotoFace, 20);

    const emojiFace = fontMgr.MakeTypefaceFromData(emojiData);
    const emojiFont = new CanvasKit.Font(emojiFace, 20);

    const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789 _.,?!æ‽🍕🍔🍟🥝🍱🕶🎩👩‍👩‍👦';
    console.log('first time');
    const robotoIDs = robotoFont.getGlyphIDs(alphabet);
    const emojiIDs = emojiFont.getGlyphIDs(alphabet);
    for (let i = 0; i < 10; i++) {
      console.log('decoding again');
      robotoFont.getGlyphIDs(alphabet);
      emojiFont.getGlyphIDs(alphabet);
    }
    console.log(robotoIDs, emojiIDs);
  }
</script>
